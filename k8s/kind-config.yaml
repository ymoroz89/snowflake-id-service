kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

name: dev-cluster

nodes:
  - role: control-plane
    image: kindest/node:v1.35.1
    kubeadmConfigPatches:
    - |
      kind: InitConfiguration
      nodeRegistration:
        kubeletExtraArgs:
          node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 30443
        hostPort: 443
        protocol: TCP

  # Worker Nodes
  - role: worker
    image: kindest/node:v1.35.1
  - role: worker
    image: kindest/node:v1.35.1
