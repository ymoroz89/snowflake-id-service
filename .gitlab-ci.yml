image: gradle:9.3.1-jdk21

stages:
  - build
  - test
  - docker-build
  - deploy
  - loadtest

variables:
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .gradle/wrapper
    - .gradle/caches

before_script:
  - chmod +x ./gradlew

build:
  stage: build
  script:
    - ./gradlew clean assemble -x test

test:
  stage: test
  script:
    - ./gradlew test
  artifacts:
    when: always
    paths:
      - "**/build/reports/tests/test"
      - "**/build/test-results/test"

docker-build:
  stage: docker-build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_IMAGE: "snowflake-id-service"
  before_script:
    - docker info
  script:
    - docker build -t "${DOCKER_IMAGE}:${CI_COMMIT_SHA}" -t "${DOCKER_IMAGE}:latest" .
    - docker save "${DOCKER_IMAGE}:latest" -o snowflake-id-service-latest.tar
  artifacts:
    paths:
      - snowflake-id-service-latest.tar
    expire_in: 1 hour

deploy:
  stage: deploy
  image: alpine/helm:3.14
  dependencies:
    - docker-build
  script:
    - kind load image-archive snowflake-id-service-latest.tar --name dev-cluster
    - helm upgrade --install snowflake-id-service ./helm/snowflake-id-service
      --namespace default
      --set image.repository=snowflake-id-service
      --set image.tag=latest
      --set image.pullPolicy=Never
      --wait
      --timeout 5m

loadtest:
  stage: loadtest
  variables:
    SNOWFLAKE_HOST: "localhost"
    SNOWFLAKE_PORT: "9090"
    SNOWFLAKE_USERS: "100"
    SNOWFLAKE_RAMP_SECONDS: "20"
    SNOWFLAKE_REQUESTS_PER_USER: "100"
    SNOWFLAKE_PAUSE_MS: "0"
    SNOWFLAKE_CALL_DEADLINE_MS: "1000"
  script:
    - ./gradlew :snowflake-server:bootRun > server.log 2>&1 & echo $! > server.pid
    - >
      bash -lc '
      for i in $(seq 1 90); do
        if (echo > /dev/tcp/${SNOWFLAKE_HOST}/${SNOWFLAKE_PORT}) >/dev/null 2>&1; then
          echo "snowflake-server is ready on ${SNOWFLAKE_HOST}:${SNOWFLAKE_PORT}"
          break
        fi
        sleep 1
        if [ "$i" -eq 90 ]; then
          echo "Timed out waiting for snowflake-server startup"
          cat server.log
          exit 1
        fi
      done
      '
    - >
      ./gradlew :snowflake-loadtest:gatlingRun
      --simulation com.ymoroz.snowflake.loadtest.SnowflakeGrpcSimulation
      -Dsnowflake.host=${SNOWFLAKE_HOST}
      -Dsnowflake.port=${SNOWFLAKE_PORT}
      -Dsnowflake.users=${SNOWFLAKE_USERS}
      -Dsnowflake.rampSeconds=${SNOWFLAKE_RAMP_SECONDS}
      -Dsnowflake.requestsPerUser=${SNOWFLAKE_REQUESTS_PER_USER}
      -Dsnowflake.pauseMs=${SNOWFLAKE_PAUSE_MS}
      -Dsnowflake.callDeadlineMs=${SNOWFLAKE_CALL_DEADLINE_MS}
  after_script:
    - if [ -f server.pid ]; then kill "$(cat server.pid)" || true; fi
  artifacts:
    when: always
    paths:
      - server.log
      - snowflake-loadtest/build/reports/gatling
