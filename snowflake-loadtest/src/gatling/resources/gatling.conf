gatling {
  charting {
    indicators {
      # These values define the thresholds for the console response time distribution.
      # Requests faster than lowerBound will be in the first bucket.
      # Requests between lowerBound and higherBound will be in the second bucket.
      # Requests slower than higherBound will be in the third bucket.
      lowerBound = 5  # e.g., t < 5 ms
      higherBound = 20 # e.g., 5 ms <= t < 20 ms, and t >= 20 ms

      # percentile1 and percentile2 are used for the detailed HTML report, not the console summary buckets.
      percentile1 = 75
      percentile2 = 95
    }
  }
  console {
    light = true
  }
}
