syntax = "proto3";

package com.ymoroz.snowflake;

option java_multiple_files = true;
option java_package = "com.ymoroz.snowflake.proto";
option java_outer_classname = "SnowflakeProto";

service SnowflakeService {
  rpc GenerateId (GenerateIdRequest) returns (GenerateIdResponse);
}

message GenerateIdRequest {
}

message GenerateIdResponse {
  int64 id = 1;
}
