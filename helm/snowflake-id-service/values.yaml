# Default values for snowflake-id-service
replicaCount: 2

image:
  repository: "ymoroz/snowflake-id-service"
  pullPolicy: IfNotPresent
  tag: "latest"
  size: 2GB

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  fsGroup: 65532

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532

service:
  type: NodePort
  port: 9090
  targetPort: 9090
  nodePort: 30090

ingress:
  enabled: true
  className: "kong"
  annotations:
    konghq.com/protocols: "grpc"
  hosts:
    - host: snowflake-id-service.local
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - snowflake-id-service.local
      secretName: snowflake-id-service-tls

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# Application specific configuration
app:
  port: 9090
  healthPort: 9091
  name: snowflake-id-service

# Persistence configuration
persistence:
  enabled: true
  accessMode: ReadWriteOnce
  size: 10Mi
  storageClass: "" # Use default storage class
  # storageClassName: "standard" # Uncomment to specify storage class

# Health checks
livenessProbe:
  grpc:
    port: 9091
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  grpc:
    port: 9091
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 5
  failureThreshold: 3
