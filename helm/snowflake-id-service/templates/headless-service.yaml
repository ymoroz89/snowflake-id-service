apiVersion: v1
kind: Service
metadata:
  name: {{ include "snowflake-id-service.fullname" . }}-headless
  labels:
    {{- include "snowflake-id-service.labels" . | nindent 4 }}
spec:
  clusterIP: None
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: grpc
  selector:
    {{- include "snowflake-id-service.selectorLabels" . | nindent 4 }}
